name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit (blocking on high/critical)
        run: pnpm audit --prod --audit-level high

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build sidecars
        run: pnpm build:sidecars

      - name: Pi approval boundary
        run: pnpm check:pi-boundary

      - name: Updater key rotation wiring
        run: pnpm check:updater-key-rotation

      - name: Test
        run: pnpm test

      - name: Coverage floor
        run: pnpm test:coverage

      - name: Build frontend
        run: pnpm build

      - name: Bundle-size budget
        run: pnpm check:bundle-size

  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets --locked

      - name: cargo check (workflow feature)
        working-directory: src-tauri
        run: cargo check --all-targets --locked --features workflow

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: cargo clippy (workflow feature)
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked --features workflow -- -D warnings

      - name: cargo nextest
        working-directory: src-tauri
        run: cargo nextest run --locked

      - name: cargo nextest (workflow feature)
        working-directory: src-tauri
        run: cargo nextest run --locked --features workflow

  rust-platforms:
    name: rust-test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets --locked

      - name: cargo check (openclicky feature)
        if: matrix.os == 'macos-latest'
        working-directory: src-tauri
        run: cargo check --all-targets --locked --features openclicky

      - name: cargo clippy (openclicky feature)
        if: matrix.os == 'macos-latest'
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked --features openclicky -- -D warnings

      - name: cargo nextest
        working-directory: src-tauri
        run: cargo nextest run --locked --retries 2

      - name: cargo nextest (openclicky feature)
        if: matrix.os == 'macos-latest'
        working-directory: src-tauri
        run: cargo nextest run --locked --features openclicky --retries 2

  e2e:
    name: e2e (linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            webkit2gtk-driver \
            xvfb

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: e2e

      - uses: taiki-e/install-action@v2
        with:
          tool: tauri-driver

      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build release binary
        working-directory: src-tauri
        run: cargo build --release --locked

      - name: Run e2e specs
        run: xvfb-run -a pnpm e2e

  coverage:
    runs-on: ubuntu-22.04
    needs: rust
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: coverage

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Generate coverage
        working-directory: src-tauri
        run: cargo llvm-cov nextest --locked --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: lcov-report
          path: src-tauri/lcov.info
          if-no-files-found: error
