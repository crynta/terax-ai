name: Android APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile (debug | release)"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned NDK matches the one set in scripts/init-android.sh defaults.
  NDK_VERSION: "28.0.12916984"
  # Pinned Alpine release to keep the rootfs bit-stable across builds.
  ALPINE_VERSION: "3.19.1"
  ALPINE_BRANCH: "v3.19"
  # SHA-256 of alpine-minirootfs-${ALPINE_VERSION}-aarch64.tar.gz from
  # https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/aarch64/
  #ALPINE_SHA256: "1dffe1adad6f5fee5b58fdf2bdd75ed1c44120e9dccb1d7c5e1547dc8be36a5b"
  # DELETE this line from the env: block:
  ALPINE_SHA256: "1dffe1adad6f5fee5b58fdf2bdd75ed1c44120e9dccb1d7c5e1547dc8be36a5b"

jobs:
  build-apk:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl wget file \
            libssl-dev \
            pkg-config \
            libtalloc-dev

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

    
      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: build-tools;34.0.0 platforms;android-34 ndk;${{ env.NDK_VERSION }} cmake;3.22.1

      - name: Export NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"

      - name: Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: android-${{ env.NDK_VERSION }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # ── Fetch real Android runtime assets ─────────────────────────────────
      # The committed files under src-tauri/assets/android/ are text
      # placeholders so the repo can build for desktop without dragging in
      # large binaries. Here we overwrite them with the real artifacts.

     # - name: Download Alpine aarch64 minirootfs
     #   working-directory: src-tauri/assets/android
     #   run: |
     #     url="https://dl-cdn.alpinelinux.org/alpine/${ALPINE_BRANCH}/releases/aarch64/alpine-minirootfs-${ALPINE_VERSION}-aarch64.tar.gz"
     #     echo "Fetching $url"
     #     curl -fL -o alpine-rootfs.tar.gz "$url"
      #    echo "${ALPINE_SHA256}  alpine-rootfs.tar.gz" | sha256sum --check -

      - name: Download Alpine aarch64 minirootfs
        working-directory: src-tauri/assets/android
        run: |
          url="https://dl-cdn.alpinelinux.org/alpine/${ALPINE_BRANCH}/releases/aarch64/alpine-minirootfs-${ALPINE_VERSION}-aarch64.tar.gz"
          echo "Fetching $url"
          curl -fL -o alpine-rootfs.tar.gz "$url"
          EXPECTED=$(curl -fL "${url}.sha256" | awk '{print $1}')
          ACTUAL=$(sha256sum alpine-rootfs.tar.gz | awk '{print $1}')
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "SHA256 mismatch! Aborting."
            exit 1
          fi
          echo "SHA256 OK"

      #- name: Build proot for aarch64-linux-android
       # run: |
       #   set -euo pipefail
       #   export NDK="$ANDROID_HOME/ndk/${NDK_VERSION}"
       #   export TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"

        #  mkdir -p /tmp/proot-build
        # git clone --depth 1 https://github.com/proot-me/proot.git /tmp/proot-build/proot
        #  cd /tmp/proot-build/proot/src

        # The Makefile understands CC/AR/STRIP overrides.
        # make -j"$(nproc)" \
        #  CC="$TOOLCHAIN/aarch64-linux-android33-clang" \
        #   AR="$TOOLCHAIN/llvm-ar" \
        #   STRIP="$TOOLCHAIN/llvm-strip" \
        #  LOADER_NAMES="ld-musl-aarch64.so.1 ld-linux-aarch64.so.1" \
        #    proot

        #  "$TOOLCHAIN/llvm-strip" proot
         # file proot | tee /dev/stderr | grep -q "ARM aarch64" \
        #    || (echo "::error::proot binary is not aarch64 ELF"; exit 1)
        #  cp proot "$GITHUB_WORKSPACE/src-tauri/assets/android/proot-aarch64"

      - name: Download proot for aarch64-linux-android
        run: |
          # Download pre-built proot from Termux package repo (Android aarch64)
          curl -fL -o /tmp/proot.deb \
            "https://packages.termux.dev/apt/termux-main/pool/main/p/proot/proot_5.4.0_aarch64.deb"

          # Extract the binary from the .deb
          cd /tmp
          ar x proot.deb
          tar xf data.tar.xz ./data/data/com.termux/files/usr/bin/proot

          # Copy into the repo assets
          cp data/data/com.termux/files/usr/bin/proot \
            "$GITHUB_WORKSPACE/src-tauri/assets/android/proot-aarch64"

          # Verify it's the right ELF type
          file "$GITHUB_WORKSPACE/src-tauri/assets/android/proot-aarch64" \
            | tee /dev/stderr \
            | grep -q "ARM aarch64" \
            || (echo "::error::proot binary is not aarch64 ELF"; exit 1)

      # ── Initialize the Android project + copy our Kotlin plugins in ───────
      - name: Initialize Android project
        run: bash ./scripts/init-android.sh

      - name: Build APK (debug)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.profile == 'debug' }}
        run: pnpm tauri android build --apk --debug

      - name: Build APK (release)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.profile == 'release' }}
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$ANDROID_KEYSTORE_PATH"
          fi
          pnpm tauri android build --apk

      - name: Upload debug APK
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.profile == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: terax-android-debug
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.profile == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: terax-android-release
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
          if-no-files-found: error
