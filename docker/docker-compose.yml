version: "3.9"

services:
  mr-robot:
    build: .
    image: terax-mr-robot
    container_name: terax-mr-robot
    network_mode: host
    volumes:
      - /tmp/mr-robot:/mr-robot
      - ~/.mr-robot:/root/.mr-robot
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY:-}
      - TERM=xterm-256color
